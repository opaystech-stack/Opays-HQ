name: CI

# Rejoue la Definition of Done à chaque push et pull request :
# typecheck + lint + tests + build de production.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build
